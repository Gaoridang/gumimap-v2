name: TestFlight

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "AGENTS.md"
      - ".github/pull_request_template.md"
  workflow_dispatch:
    inputs:
      allow_create_distribution_cert:
        description: "Bootstrap only — create a new Distribution cert (default false)"
        type: boolean
        default: false
      release:
        description: "App Store release — bump marketing version (TestFlight keeps version, build +1 only)"
        type: boolean
        default: false
      marketing_version:
        description: "Target version for release (optional; default patch bump from project, e.g. 0.0.1 → 0.0.2)"
        type: string
        required: false

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  signing-contract:
    name: Verify controlled signing error path
    runs-on: macos-26
    if: github.event_name == 'workflow_dispatch' && inputs.allow_create_distribution_cert == false
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Run signing decision unit tests
        run: ruby fastlane/spec/signing_decision_spec.rb

      - name: Run controlled error lane (expect instructions, never cert)
        env:
          ALLOW_CREATE_DISTRIBUTION_CERT: "false"
        run: |
          set +e
          bundle exec fastlane signing_controlled_error_check 2>&1 | tee controlled-signing-error.log
          status=$?
          if grep -q "No reusable Distribution certificate is available for CI" controlled-signing-error.log; then
            if grep -qF "Could not create another Distribution certificate" controlled-signing-error.log; then
              echo "FAIL: quota phrase must not appear on controlled path"
              exit 1
            fi
            if grep -qF "--- Step: cert ---" controlled-signing-error.log; then
              echo "FAIL: cert() must not run on controlled path"
              exit 1
            fi
            echo "OK: controlled signing error path verified"
            exit 0
          fi
          echo "FAIL: expected controlled instructions in fastlane output (exit $status)"
          exit 1

  deploy:
    name: Build and upload to TestFlight
    needs: signing-contract
    if: always() && (needs.signing-contract.result == 'success' || needs.signing-contract.result == 'skipped')
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Install Apple WWDR certificate
        run: |
          curl -fsSL -o /tmp/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import /tmp/AppleWWDRCAG3.cer -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign -T /usr/bin/security

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT_BASE64: ${{ secrets.ASC_KEY_CONTENT_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          if [[ -z "$ASC_KEY_CONTENT_BASE64" ]]; then
            echo "ASC_KEY_CONTENT_BASE64 secret is missing."
            echo "Run: base64 -i AuthKey_${ASC_KEY_ID}.p8 | tr -d '\\n' | pbcopy"
            echo "Then add it as repository secret ASC_KEY_CONTENT_BASE64."
            exit 1
          fi
          echo "$ASC_KEY_CONTENT_BASE64" | base64 --decode > "$KEY_PATH"
          openssl pkey -in "$KEY_PATH" -noout -text > /dev/null
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Generate app secrets
        run: |
          cat > Config/secrets.local.env <<EOF
          KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          EOF
          ./scripts/generate-secrets.sh

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Restore signing cache
        uses: actions/cache/restore@v4
        id: signing-cache
        with:
          path: fastlane/signing
          key: signing-v3-${{ runner.os }}-${{ hashFiles('fastlane/signing/distribution.p12', 'fastlane/signing/.p12-pass', 'fastlane/signing/profile.mobileprovision') }}
          restore-keys: |
            signing-v3-${{ runner.os }}-

      - name: Validate signing cache
        id: signing-cache-valid
        run: |
          set -euo pipefail
          p12="fastlane/signing/distribution.p12"
          if [[ -f "$p12" ]] && [[ $(wc -c < "$p12" | tr -d ' ') -ge 1000 ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Signing cache contains a usable distribution.p12"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            rm -rf fastlane/signing
            mkdir -p fastlane/signing
            echo "Signing cache miss or invalid; cleared for bootstrap"
          fi

      - name: Install signing from repository secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [[ -n "$BUILD_CERTIFICATE_BASE64" ]]; then
            ./scripts/ci-install-signing.sh
          fi

      - name: Deploy to TestFlight
        run: bundle exec fastlane ${{ github.event_name == 'workflow_dispatch' && inputs.release == true && 'release' || 'beta' }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ env.ASC_KEY_PATH }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          MARKETING_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release == true && inputs.marketing_version || '' }}
          # Manual dispatch defaults to false; push uses repo variable for one-time bootstrap.
          ALLOW_CREATE_DISTRIBUTION_CERT: ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.allow_create_distribution_cert) || vars.ALLOW_CREATE_DISTRIBUTION_CERT }}

      - name: Save signing cache
        uses: actions/cache/save@v4
        if: always() && steps.signing-cache-valid.outputs.valid != 'true' && hashFiles('fastlane/signing/distribution.p12') != ''
        with:
          path: fastlane/signing
          key: signing-v3-${{ runner.os }}-${{ hashFiles('fastlane/signing/distribution.p12', 'fastlane/signing/.p12-pass', 'fastlane/signing/profile.mobileprovision') }}