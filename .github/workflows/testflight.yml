name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Configure App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
          printf '%s' "${{ secrets.ASC_KEY_CONTENT }}" > "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}

      - name: Generate app secrets
        run: |
          cat > Config/secrets.local.env <<EOF
          KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          EOF
          ./scripts/generate-secrets.sh

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: .

      - name: Deploy to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}