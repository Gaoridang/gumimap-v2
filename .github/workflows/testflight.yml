name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and upload to TestFlight
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Install Apple WWDR certificate
        run: |
          curl -fsSL -o /tmp/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import /tmp/AppleWWDRCAG3.cer -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign -T /usr/bin/security

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT_BASE64: ${{ secrets.ASC_KEY_CONTENT_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          if [[ -z "$ASC_KEY_CONTENT_BASE64" ]]; then
            echo "ASC_KEY_CONTENT_BASE64 secret is missing."
            echo "Run: base64 -i AuthKey_${ASC_KEY_ID}.p8 | tr -d '\\n' | pbcopy"
            echo "Then add it as repository secret ASC_KEY_CONTENT_BASE64."
            exit 1
          fi
          echo "$ASC_KEY_CONTENT_BASE64" | base64 --decode > "$KEY_PATH"
          openssl pkey -in "$KEY_PATH" -noout -text > /dev/null
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Generate app secrets
        run: |
          cat > Config/secrets.local.env <<EOF
          KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}
          KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          EOF
          ./scripts/generate-secrets.sh

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: .

      - name: Restore signing cache
        uses: actions/cache@v4
        with:
          path: fastlane/signing
          key: signing-v1-${{ runner.os }}
          restore-keys: |
            signing-v1-${{ runner.os }}

      - name: Install signing from repository secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [[ -n "$BUILD_CERTIFICATE_BASE64" ]]; then
            ./scripts/ci-install-signing.sh
          fi

      - name: Deploy to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ env.ASC_KEY_PATH }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}